<head>

    <title>MODERN COMPUTING IS RUBBISH/title>
    <style>
        /* --- NATE SILVER SIGNAL MANIFESTO PRINT & WEB ENGINE --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        @page {
            size: A4;
            margin: 15mm 12mm;

        }

        body {
            margin: 0;
            padding: 0;

            print-color-adjust: exact;
        }

        .manifesto-wrapper {

        /* Cover branding for GitHub Pages entry point */

        .entry-page {

            min-height: 265mm;

        }

        /* Top Header System */
        .entry-header {

        .entry-number {
            font-family: monospace;
            font-size: 11pt;

        }

        .entry-header h2 {
            font-size: 22pt;

        }

        .system-taxonomy {

        /* Asymmetric Layout Frame */
        .layout-table {
            display: table;

        /* High-Density Signal Yellow Sidebar */

        }

        /* Sidebar Elements */
        .meta-group {

        .meta-label {

        /* Prose Elements */
        h3.section-title {

        }

        .prose-text p {
            font-family: "Georgia", Georgia, serif;
            font-size: 11pt;

        }

        }

        /* Shaded Manifesto Commentary Box */
        .commentary-box {
            background-color: #1a1a1a;

            padding: 20px;

            border-left: 8px solid #FFDE17;
        }

        .commentary-header {
            font-family: monospace;
            font-size: 9pt;

        }

            font-family: "Georgia", Georgia, serif;
            font-style: italic;

        }

        /* Technical responsive behavior for web view while preserving print columns */
        @media (max-width: 650px) {
            .layout-table, .layout-row, .meta-pillar, .prose-core {
                display: block;
                width: 100%;
            }
            .meta-pillar {
                border-right: none;
                border-bottom: 3px solid #1a1a1a;
                margin-bottom: 20px;
            }

                padding-left: 0;
            }

        @media print {
            body { background-color: #ffffff; padding: 0; }
            .manifesto-wrapper { max-width: 100%; padding: 0; }
            .manifesto-title-card { display: none; }

                margin: 0;

<body>

    <div class="manifesto-wrapper">

        <!-- Core Landing Title Card -->
        <div class="manifesto-title-card">
            <h1>Almanac of Modern Computing Rubbish</h1>
            <p>An Unredacted Structural Autopsy of Interface Hostility</p>
        </div>

        <!-- ==================== ENTRY 01 ==================== -->
        <section class="entry-page">
            <div class="entry-header">
                <div class="entry-number">ENTRY 01</div>
                <h2>The Mobile Virtual Keyboard</h2>
                <div class="system-taxonomy">System Taxonomy // Interface Gaslighting & Input Sabotage</div>
            </div>

            <div class="layout-table">
                <div class="layout-row">
                    <div class="meta-pillar">
                        <div class="meta-group">
                            <div class="meta-label">The Who</div>
                            <div class="meta-value">Apple Inc. (iOS Core Architecture) & Google LLC (Android OS)</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The What</div>
                            <div class="meta-value">The systematic destruction of the mobile virtual keyboard through hidden bounding-box manipulation, erratic autocorrect overrides, and predictive machine-learning engines.</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The When</div>
                            <div class="meta-value">Began with the death of physical tactile keys; degraded into catastrophic unreliability by the 2025–2026 software update cycles.</div>
                        </div>
                    </div>

                    <div class="prose-core">
                        <h3 class="section-title">The Why It Is Rubbish</h3>
                        <div class="prose-text">
                            <p>Modern mobile operating systems have transformed the act of typing from a precise mechanical transaction into a maddening psychological guessing game. In early capacitive touch screens, a virtual keyboard was a static map: hitting a specific pixel coordinate yielded the exact corresponding character. Modern systems completely violate this transparent input-output principle.</p>
                            
                            <p>To mask the lack of tactile accuracy on flat glass, platforms use internal machine-learning algorithms to dynamically alter the invisible <strong>bounding boxes</strong> of letters in real-time. If the operating system predicts your next character should be an "E," it silently broadens the tap-target area of the "E" key while reducing the target size of neighboring keys like "W" or "R."</p>
                            
                            <p>This dynamic manipulation backfires completely for users with native mechanical muscle memory. Because the interface gaslights you by shifting boundaries beneath your thumbs without visual cues, you are forced to fight the machine for control of your own parameters. To compound the failure, aggressively optimized predictive engines forcefully inject complete word replacements precisely as you strike the spacer bar, forcing users to repeatedly delete and manually retype vocabulary that the algorithm deems statistical noise.</p>
                        </div>

                        <div class="commentary-box">
                            <div class="commentary-header">📢 Colorful Commentary</div>
                            <div class="commentary-content">
                                "This is explicit user gaslighting engineered at global scale. Trillion-dollar tech monopolies are subtly rewriting your linguistic outputs as your thumbs land on the glass. The software looks you dead in the eye, intercepts your muscle memory, types something completely insane, and then tells you it’s your fault because your finger deviated by four microscopic pixels. They have turned human-computer interaction into a psychological warfare zone where the machine refuses to accept the direct intentional instructions of its pilot. It is an algorithmic arrogance so profound that it strips humanity of basic linguistic agency, all under the guise of an 'intelligent user experience.' It is an absolute, unmitigated nightmare."
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== ENTRY 02 ==================== -->
        <section class="entry-page">
            <div class="entry-header">
                <div class="entry-number">ENTRY 02</div>
                <h2>The Strategic Deletion of "Undo"</h2>
                <div class="system-taxonomy">System Taxonomy // Destructive Interaction Architecture</div>
            </div>

            <div class="layout-table">
                <div class="layout-row">
                    <div class="meta-pillar">
                        <div class="meta-group">
                            <div class="meta-label">The Who</div>
                            <div class="meta-value">Silicon Valley Mobile Application Frameworks</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The What</div>
                            <div class="meta-value">The systematic elimination of the explicit 'Undo' option or historical control toggles from messaging, commenting, and content Creation flows.</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The When</div>
                            <div class="meta-value">Accelerated through the mid-2020s as applications shifted completely toward ephemeral, low-friction mobile timelines.</div>
                        </div>
                    </div>

                    <div class="prose-core">
                        <h3 class="section-title">The Why It Is Rubbish</h3>
                        <div class="prose-text">
                            <p>One of the foundational tenets of classic human-computer interface design is user freedom and control—specifically, the ironclad availability of an explicit, immediate escape hatch when an accidental or erroneous action occurs. Modern mobile software has completely abandoned this protective design philosophy.</p>
                            
                            <p>By removing clear, persistent <strong>Undo or Cancel toggles</strong> from input modules, applications create irreversible workflows. If an accidental swipe, screen rotation, or erratic double-tap triggers a form submission or a data purge, the system immediately locks the action into place.</p>
                            
                            <p>Instead of offering a universal backward-stepping interface, platforms require users to navigate extensive account dashboard mazes or perform complex device maneuvers (like physically shaking a phone) to trigger historical recovery. This intentional removal of input protection layers elevates user anxiety, turning every basic navigational task into a high-risk error trap where data loss is normalized to ensure application speed.</p>
                        </div>

                        <div class="commentary-box">
                            <div class="commentary-header">📢 Colorful Commentary</div>
                            <div class="commentary-content">
                                "We have let software designers systematically run an active campaign of erasure against the most civilized button ever conceived by human logic: Undo. The digital environment used to be a forgiving laboratory where you could explore, execute commands, make mistakes, and immediately step backward without penalty. Now, modern applications treat your fingers like an absolute, unforgiving trapdoor. One slip of your thumb on a bouncing interface element, and your draft is vaporized or your unedited thought is fired off into the public square forever. It is an interface built without mercy, deliberately configured to generate constant cognitive friction and paranoia so you stay alert and hyper-engaged inside their ecosystem."
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== ENTRY 03 ==================== -->
        <section class="entry-page">
            <div class="entry-header">
                <div class="entry-number">ENTRY 03</div>
                <h2>Gathering and Deleting Old Comments on YouTube</h2>
                <div class="system-taxonomy">System Taxonomy // Dark Patterns & Data Captivity</div>
            </div>

            <div class="layout-table">
                <div class="layout-row">
                    <div class="meta-pillar">
                        <div class="meta-group">
                            <div class="meta-label">The Who</div>
                            <div class="meta-value">Google LLC / YouTube Architecture & Identity Systems</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The What</div>
                            <div class="meta-value">The exile of personal comment history away from the core app interface, offloading it into an obscure, low-density sub-portal of a centralized account database.</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The When</div>
                            <div class="meta-value">Solidified via 'Google My Activity' and buried beneath deep menu layers inside the mobile application interface.</div>
                        </div>
                    </div>

                    <div class="prose-core">
                        <h3 class="section-title">The Why It Is Rubbish</h3>
                        <div class="prose-text">
                            <p>It operates as an asymmetric digital 'one-way valve'—engineered to make comment input entirely frictionless while making data audit, retrieval, and retraction a bureaucratic gauntlet. The platform completely severs historical dialogue from its contextual source, rendering a flat, chronological feed of raw text strings stripped of original conversational threads or replies.</p>
                            
                            <p>Crucially, <strong>the interface refuses to supply a global 'Select All -> Bulk Delete' control mechanism.</strong> To clean a historical footprint across thousands of comments, a user must manually click an individual delete target box and separate secondary confirmation dialogs for every single item, one line at a time.</p>
                            
                            <p>This structural friction marks a profound <strong>socialization of the downsides of bad design</strong>. By constructing a system where an author cannot rapidly audit or retract past statements, impulsive human vulnerabilities—such as a mean or thoughtless comment left while drunk, angry, or exhausted—are frozen into permanent corporate assets. The interface actively frustrates the natural human desire to self-correct, escalating real-world distress and toxicity while hoarding data assets.</p>
                        </div>

                        <div class="commentary-box">
                            <div class="commentary-header">📢 Colorful Commentary</div>
                            <div class="commentary-content">
                                "This is the corporate algorithmic harvesting of human emotional volatile energy. Human beings get lonely, angry, or leave thoughtless text on a timeline after a brutal shift. A humane tool would provide an immediate rearview mirror—a clear toggle to clean up the past. Instead, Google forces you through a technological safari, keeping your past trapped line-by-line like a digital chain gang. They monetize the conflict and the metrics, while society absorbs the resulting psychological toxicity and broken real-world dispositions. It is an interface configured to profit off our inability to easily forgive ourselves."
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== ENTRY 04 ==================== -->
        <section class="entry-page">
            <div class="entry-header">
                <div class="entry-number">ENTRY 04</div>
                <h2>Mobile Maps as In-Car Infotainment</h2>
                <div class="system-taxonomy">System Taxonomy // Vehicular Category Error</div>
            </div>

            <div class="layout-table">
                <div class="layout-row">
                    <div class="meta-pillar">
                        <div class="meta-group">
                            <div class="meta-label">The Who</div>
                            <div class="meta-value">Google LLC (Google Maps/Waze) & Apple Inc. (Apple Maps)</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The What</div>
                            <div class="meta-value">The dangerous degradation of the vehicle cockpit from a tactile, proprioceptive instrument cluster into a flat touch-tablet dictated by corporate utility patents.</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The When</div>
                            <div class="meta-value">Accelerated 2014–2015 via CarPlay/Android Auto; finalized as an active public safety crisis 2025–2026.</div>
                        </div>
                    </div>

                    <div class="prose-core">
                        <h3 class="section-title">The Why It Is Rubbish</h3>
                        <div class="prose-text">
                            <p>Physical vehicle controls rely on human <strong>proprioception</strong>—the innate capacity of the muscular system to navigate physical architecture without visual target confirmation. A driver can adjust a climate dial or track an analog switch using sensory muscle memory alone, keeping their visual field fixed completely on the asphalt.</p>
                            
                            <p>Touchscreen layouts completely abolish this safety baseline. Because a flat plane of glass feels identical regardless of target function, a driver is forced to break visual attention from the road to track graphic elements. This structural deficiency is made actively worse by defensive corporate patent profiling.</p>
                            
                            <p>During the smartphone OS wars, Apple weaponized <strong>U.S. Patent No. 7,844,915</strong>, which covered how screen math separates parallel scaling and rotation inputs. To evade ongoing litigation, Google rolled these inputs into an undifferentiated touch framework. Consequently, a user trying to pinch-to-zoom on a tight highway junction accidentally triggers an axis-rotation vector, completely breaking the critical "North-up" orientation lock.</p>
                            
                            <p>Because Apple similarly monopolized the intuitive bounce-back boundary reset framework under <strong>U.S. Patent No. 7,469,381</strong>, the map cannot simply be snapped back into position. Instead, recovering spatial orientation requires a complex, multi-tap manual hunt for a microscopic compass target icon on a vibrating dashboard at highway speeds.</p>
                        </div>

                        <div class="commentary-box">
                            <div class="commentary-header">📢 Colorful Commentary</div>
                            <div class="commentary-content">
                                "We aren't driving with the best navigation interface that human ingenuity can construct; we are driving with an interface heavily redacted by corporate intellectual property lawyers. If an aerospace company designed an altimeter that was intentionally confusing to pilots to avoid paying a licensing fee to a competitor, the FAA would ground the aircraft within an hour. But when Apple and Google engage in a petty patent-trolling cold war, they just pass the visual distraction and danger down to you while you’re trying to merge across four lanes of heavy semi-truck traffic. They have literal corporate bodyguards protecting their UI patents, while you are left on the interstate playing dashboard whack-a-mole. It is the absolute socialization of physical danger."
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== ENTRY 05 ==================== -->
        <section class="entry-page">
            <div class="entry-header">
                <div class="entry-number">ENTRY 05</div>
                <h2>The Silicon Valley Malpractice Vacuum</h2>
                <div class="system-taxonomy">System Taxonomy // Legal Accountability Deficit</div>
            </div>

            <div class="layout-table">
                <div class="layout-row">
                    <div class="meta-pillar">
                        <div class="meta-group">
                            <div class="meta-label">The Who</div>
                            <div class="meta-value">The Consumer Software Industry at Large</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The What</div>
                            <div class="meta-value">The total absence of a standardized, legally binding ethical framework, professional licensing board, or civil liability structures for consumer software authors.</div>
                        </div>
                        <div class="meta-group">
                            <div class="meta-label">The When</div>
                            <div class="meta-value">Institutionalized during the 2010s under the "Move Fast and Break Things" mantra; insulated permanently by legacy 1990s digital liability shields.</div>
                        </div>
                    </div>

                    <div class="prose-core">
                        <h3 class="section-title">The Why It Is Rubbish</h3>
                        <div class="prose-text">
                            <p>In any established engineering discipline where flawed execution directly compromises public health, safety, or fundamental human literacy—civil engineering, structural architecture, pharmacology, or aviation—practice is strictly governed by state or federal credentialing frameworks. A licensed engineer who signs off on structural designs without verified load calculations faces rapid license revocation, devastating civil exposure, and severe criminal negligence charges.</p>
                            
                            <p>Consumer software engineering completely evades this standard. Because products are distributed behind un-navigable End User License Agreements (EULAs) that systematically strip the end-user of all warranties and legal recourse, tech monopolies operate inside an absolute legal void.</p>
                            
                            <p>Design teams are directly rewarded for deploying addictive, manipulative, or physically hazardous interfaces—such as removing manual climate switches or constructing algorithmically trapped data loops—because no enforcement mechanism exists to hold the individual developer accountable. The tech cartel has spent decades pretending that because their outputs are rendered in lines of code rather than poured concrete, they are wholly exempt from civil accountability or ethical liability loops.</p>
                        </div>

                        <div class="commentary-box">
                            <div class="commentary-header">📢 Colorful Commentary</div>
                            <div class="commentary-content">
                                "If a bridge collapses because the architect wanted to save a few bucks on steel or thought a minimalist, floating support beam looked prettier on Instagram, people go to prison. But when a team of Silicon Valley product managers removes the physical climate controls from a vehicle's dashboard, forcing a driver to dig through three sub-menus on a piece of glass at eighty miles per hour just to defog their windshield, it's called an 'innovation roadmap.' We have let an entire trillion-dollar industry opt out of civilization's safety standards. Software developers like to call themselves 'engineers,' but they don't want the actual weight of the title. Real engineers carry malpractice insurance. Real engineers sign their names to blueprints with the sober knowledge that if their math is sloppy, bodies end up in the dirt. Until software authors face a professional licensing board and real liability for the human wreckage their interfaces cause, our machines will remain precisely what they are: beautifully polished, incredibly lucrative rubbish."
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>
